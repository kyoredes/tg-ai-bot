services:
  auth-db:
    image: postgres:16-alpine
    container_name: rageai-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  sub-db:
    image: postgres:16-alpine
    container_name: rageai-sub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sub
    volumes:
      - sub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rageai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    container_name: rageai-auth-service
    restart: unless-stopped
    environment:
      LOGGING_MODE: text
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth
      DB_SSL: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-prod!!}
      ACCESS_TOKEN_EXPIRATION: 3600
      REFRESH_TOKEN_EXPIRATION: 86400
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "50051:50051"

  subscription-service:
    build:
      context: ..
      dockerfile: subscription-service/Dockerfile
    container_name: rageai-subscription-service
    restart: unless-stopped
    environment:
      LOGGING_MODE: text
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50052
      DB_HOST: sub-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sub
      DB_SSL: disable
    depends_on:
      sub-db:
        condition: service_healthy
    ports:
      - "50052:50052"

  gateway-service:
    build:
      context: ..
      dockerfile: gateway-service/Dockerfile
    container_name: rageai-gateway-service
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOGGING_MODE: text
      TIMEOUT: 30s
      AUTH_HOST: auth-service
      AUTH_GRPC_PORT: 50051
      AUTH_TIMEOUT: 10
      SUB_HOST: subscription-service
      SUB_GRPC_PORT: 50052
      AI_HOST: ai-service
      AI_GRPC_PORT: 50053
      COMMON_PUB_KEY: ${COMMON_PUB_KEY:-secret}
    depends_on:
      - auth-service
      - subscription-service
      - ai-service
    ports:
      - "8000:8000"

  ai-service:
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
    container_name: rageai-ai-service
    restart: unless-stopped
    environment:
      DEBUG: ${AI_DEBUG:-true}
      LOG_LEVEL: INFO
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50053
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "50053:50053"

  aiogram-service:
    build:
      context: ..
      dockerfile: aiogram-service/Dockerfile
    container_name: rageai-aiogram-service
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GATEWAY_HOST: gateway-service
      GATEWAY_PORT: 8000
      COMMON_PUB_KEY: ${COMMON_PUB_KEY:-secret}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - gateway-service

volumes:
  auth_db_data:
  sub_db_data:
  redis_data:
