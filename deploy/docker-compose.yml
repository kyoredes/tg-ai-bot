services:
  auth-db:
    image: postgres:16-alpine
    container_name: agrobot-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  sub-db:
    image: postgres:16-alpine
    container_name: agrobot-sub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sub
    volumes:
      - sub_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agrobot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: agrobot-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --set
      - redpanda.kafka_batch_max_bytes=4194304
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    container_name: agrobot-auth-service
    restart: unless-stopped
    environment:
      LOGGING_MODE: text
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: auth
      DB_SSL: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-prod!!}
      ACCESS_TOKEN_EXPIRATION: 3600
      REFRESH_TOKEN_EXPIRATION: 86400
      THROTTLE_ENABLED: ${THROTTLE_ENABLED:-true}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      THROTTLE_WINDOW: ${THROTTLE_WINDOW:-60s}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "50051:50051"

  subscription-service:
    build:
      context: ..
      dockerfile: subscription-service/Dockerfile
    container_name: agrobot-subscription-service
    restart: unless-stopped
    environment:
      LOGGING_MODE: text
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50052
      DB_HOST: sub-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: sub
      DB_SSL: disable
      THROTTLE_ENABLED: ${THROTTLE_ENABLED:-true}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      THROTTLE_WINDOW: ${THROTTLE_WINDOW:-60s}
    depends_on:
      sub-db:
        condition: service_healthy
    ports:
      - "50052:50052"

  gateway-service:
    build:
      context: ..
      dockerfile: gateway-service/Dockerfile
    container_name: agrobot-gateway-service
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOGGING_MODE: text
      TIMEOUT: ${GATEWAY_TIMEOUT:-120s}
      AUTH_HOST: auth-service
      AUTH_GRPC_PORT: 50051
      AUTH_TIMEOUT: 10
      SUB_HOST: subscription-service
      SUB_GRPC_PORT: 50052
      AI_HOST: ai-service
      AI_GRPC_PORT: 50053
      COMMON_PUB_KEY: ${COMMON_PUB_KEY:-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-admin-jwt-secret-change-in-prod}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-http://localhost:3000}
      THROTTLE_ENABLED: ${THROTTLE_ENABLED:-true}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-120}
      THROTTLE_WINDOW: ${THROTTLE_WINDOW:-60s}
      THROTTLE_CHAT_LIMIT: ${THROTTLE_CHAT_LIMIT:-10}
      THROTTLE_CHAT_WINDOW: ${THROTTLE_CHAT_WINDOW:-60s}
      THROTTLE_LOGIN_LIMIT: ${THROTTLE_LOGIN_LIMIT:-10}
      THROTTLE_LOGIN_WINDOW: ${THROTTLE_LOGIN_WINDOW:-60s}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
    depends_on:
      auth-service:
        condition: service_started
      subscription-service:
        condition: service_started
      ai-service:
        condition: service_started
      redpanda:
        condition: service_healthy
    ports:
      - "8000:8000"

  ai-service:
    build:
      context: ..
      dockerfile: ai-service/Dockerfile
    container_name: agrobot-ai-service
    restart: unless-stopped
    environment:
      DEBUG: ${AI_DEBUG:-true}
      LOG_LEVEL: INFO
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50053
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      LITELLM_MODEL: ${LITELLM_MODEL:-gpt-3.5-turbo}
      LITELLM_PROFILE_MODEL: ${LITELLM_PROFILE_MODEL:-gpt-4o-mini}
      LITELLM_TEMPERATURE: ${LITELLM_TEMPERATURE:-0.2}
      LITELLM_MAX_TOKENS: ${LITELLM_MAX_TOKENS:-3000}
      LITELLM_REQUEST_TIMEOUT: ${LITELLM_REQUEST_TIMEOUT:-120}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_API_BASE: ${LITELLM_API_BASE:-}
      LITELLM_CUSTOM_PROVIDER: ${LITELLM_CUSTOM_PROVIDER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      THROTTLE_ENABLED: ${THROTTLE_ENABLED:-true}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      THROTTLE_WINDOW_SECONDS: ${THROTTLE_WINDOW_SECONDS:-60}
      THROTTLE_CHAT_LIMIT: ${THROTTLE_CHAT_LIMIT:-10}
      THROTTLE_CHAT_WINDOW_SECONDS: ${THROTTLE_CHAT_WINDOW_SECONDS:-60}
      THROTTLE_PROFILE_LIMIT: ${THROTTLE_PROFILE_LIMIT:-3}
      THROTTLE_PROFILE_WINDOW_SECONDS: ${THROTTLE_PROFILE_WINDOW_SECONDS:-3600}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_GROUP_ID: ai-service-profile-worker
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "50053:50053"

  aiogram-service:
    build:
      context: ..
      dockerfile: aiogram-service/Dockerfile
    container_name: agrobot-aiogram-service
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GATEWAY_HOST: gateway-service
      GATEWAY_PORT: 8000
      COMMON_PUB_KEY: ${COMMON_PUB_KEY:-secret}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-120}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_GROUP_ID: aiogram-profile-results
      THROTTLE_ENABLED: ${THROTTLE_ENABLED:-true}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-5}
      THROTTLE_WINDOW: ${THROTTLE_WINDOW:-5}
      THROTTLE_BAN_SECONDS: ${THROTTLE_BAN_SECONDS:-100}
    depends_on:
      gateway-service:
        condition: service_started
      redpanda:
        condition: service_healthy

  admin-panel:
    build:
      context: ..
      dockerfile: admin-panel/Dockerfile
    container_name: agrobot-admin-panel
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - gateway-service

volumes:
  auth_db_data:
  sub_db_data:
  redis_data:
