syntax = "proto3";

package ai.v1;

option go_package = "rageai/proto/gen/go/ai/v1;aiv1";

service AIService {
  rpc Chat(ChatRequest) returns (ChatResponse);
}

message ChatRequest {
  string telegram_id = 1;
  string prompt = 2;
}

message ChatResponse {
  string telegram_id = 1;
  string response = 2;
}
